<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mkulima Alert - Forum</title>
    <!-- include same CSS, Firebase scripts -->
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        .forum-container { max-width: 1200px; margin: 2rem auto; padding: 1rem; }
        .category-list { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .category-btn { padding: 0.5rem 1rem; background: #e2e8f0; border: none; border-radius: 0.5rem; cursor: pointer; }
        .category-btn.active { background: var(--emerald); color: white; }
        .topic-list { margin-top: 1rem; }
        .topic { border-bottom: 1px solid #eee; padding: 1rem; cursor: pointer; }
        .topic:hover { background: #f8fafc; }
        .topic-title { font-weight: bold; }
        .topic-meta { font-size: 0.8rem; color: #64748b; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 2rem; border-radius: 1rem; width: 90%; max-width: 500px; }
        .close-modal { float: right; cursor: pointer; font-size: 1.5rem; }
    </style>
</head>
<body>
    <div class="forum-container">
        <h1>Farmer Forum</h1>
        <div class="category-list" id="categoryList"></div>
        <button onclick="openNewTopicModal()" class="btn btn-primary">Start New Topic</button>
        <div id="topicsList" class="topic-list"></div>
    </div>

    <!-- New Topic Modal -->
    <div id="newTopicModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2>Create New Topic</h2>
            <form id="newTopicForm">
                <div class="form-group">
                    <label>Category</label>
                    <select id="topicCategory" required>
                        <!-- populated by JS -->
                    </select>
                </div>
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="topicTitle" required>
                </div>
                <div class="form-group">
                    <label>Content</label>
                    <textarea id="topicContent" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Post Topic</button>
            </form>
        </div>
    </div>

    <script src="forum.js"></script>
</body>
</html>
