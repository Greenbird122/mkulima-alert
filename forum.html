<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mkulima Alert - Forum</title>
    <!-- Standard favicon -->
<link rel="icon" type="image/x-icon" href="favicon.ico">
<!-- For modern browsers (PNG) -->
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<!-- Apple touch icon (for iOS home screen) -->
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    
    <!-- same meta, fonts, CSS, Firebase SDKs as above -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@0.344.0/font/lucide.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        /* forum-specific styles (optional) */
        .topic-card {
            background: white;
            border-radius: 0.75rem;
            padding: 1rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .topic-card:hover {
            background: var(--slate-50);
            transform: translateX(4px);
        }
    </style>
</head>
<body>
<div class="dashboard-layout">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="dashboard.html" class="logo">
                <div class="logo-icon"><i data-lucide="cloud-sun"></i></div>
                <div class="logo-text">
                    <span class="logo-title">Mkulima Alert</span>
                    <span class="logo-sub">Climate Smart</span>
                </div>
            </a>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <i data-lucide="cloud-sun"></i> Weather
            </a>
            <a href="marketplace.html" class="nav-item">
                <i data-lucide="shopping-cart"></i> Marketplace
            </a>
            <a href="forum.html" class="nav-item active">
                <i data-lucide="message-square"></i> Forum
            </a>
            <a href="consultation.html" class="nav-item">
                <i data-lucide="phone-call"></i> Consultation
            </a>
            <a href="#" class="nav-item" id="logoutBtn">
                <i data-lucide="log-out"></i> Logout
            </a>
        </nav>
    </aside>

    <main class="main-content">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>Farmer Forum</h1>
            <button class="menu-toggle-dashboard" id="menuToggle" style="display: none;">☰</button>
        </div>

        <!-- Forum content (keep your existing code) -->
        <div class="category-list" id="categoryList"></div>
        <button onclick="openNewTopicModal()" class="btn btn-primary">Start New Topic</button>
        <div id="topicsList" class="topic-list"></div>
    </main>
</div>

<!-- New Topic Modal (same as before) -->
<div id="newTopicModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <h2>Create New Topic</h2>
        <form id="newTopicForm">
            <div class="form-group">
                <label>Category</label>
                <select id="topicCategory" required></select>
            </div>
            <div class="form-group">
                <label>Title</label>
                <input type="text" id="topicTitle" required>
            </div>
            <div class="form-group">
                <label>Content</label>
                <textarea id="topicContent" rows="5" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Post Topic</button>
        </form>
    </div>
</div>

<script src="forum.js"></script>
<script>
    // Sidebar toggle, logout, icons (same as marketplace)
    const menuToggle = document.getElementById('menuToggle');
    const sidebar = document.getElementById('sidebar');
    if (menuToggle) {
        menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('open');
        });
    }
    document.getElementById('logoutBtn').addEventListener('click', (e) => {
        e.preventDefault();
        auth.signOut().then(() => window.location.href = "index.html");
    });
    lucide.createIcons();
</script>
</body>
</html>
