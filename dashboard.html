<!DOCTYPE html>
<html lang="en">
<head>
    <!-- ... same meta, fonts, CSS, Firebase scripts ... -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
<div class="dashboard-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="dashboard.html" class="logo">
                <div class="logo-icon"><i data-lucide="cloud-sun"></i></div>
                <div class="logo-text">
                    <span class="logo-title">Mkulima Alert</span>
                    <span class="logo-sub">Climate Smart</span>
                </div>
            </a>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item active">
                <i data-lucide="cloud-sun"></i> Weather
            </a>
            <a href="marketplace.html" class="nav-item">
                <i data-lucide="shopping-cart"></i> Marketplace
            </a>
            <a href="forum.html" class="nav-item">
                <i data-lucide="message-square"></i> Forum
            </a>
            <a href="consultation.html" class="nav-item">
                <i data-lucide="phone-call"></i> Consultation
            </a>
            <a href="#" class="nav-item" id="logoutBtn">
                <i data-lucide="log-out"></i> Logout
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>Welcome, <span id="userName">Farmer</span>!</h1>
            <button class="menu-toggle-dashboard" id="menuToggle" style="display: none;">☰</button>
        </div>

        <!-- Weather widget (same as before) -->
        <div class="weather-section">
            <h2>Weather Forecast</h2>
            <label for="countySelect">Your County:</label>
            <select id="countySelect">
                <!-- options -->
            </select>
            <div id="weatherWidget" class="weather-widget"></div>
        </div>
    </main>
</div>

<script src="dashboard.js"></script>
<script>
    // Toggle sidebar on mobile
    const menuToggle = document.getElementById('menuToggle');
    const sidebar = document.getElementById('sidebar');
    if (menuToggle) {
        menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('open');
        });
    }
    // Logout button
    document.getElementById('logoutBtn').addEventListener('click', (e) => {
        e.preventDefault();
        auth.signOut().then(() => window.location.href = "index.html");
    });
    // Lucide icons
    lucide.createIcons();
</script>
</body>
</html>
