<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mkulima Alert - Dashboard</title>
    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@0.344.0/font/lucide.css">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            color: #334155;
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
            background: #0f172a;
            transition: background 0.5s ease;
        }
        /* Animated gradient background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(125deg, #0f172a, #1e293b, #0f172a);
            background-size: 200% 200%;
            animation: gradientFlow 12s ease infinite;
            transition: background 0.5s;
        }
        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        /* Floating particles (subtle life) */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        .particle {
            position: absolute;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            animation: floatParticle 8s infinite ease-in-out;
        }
        @keyframes floatParticle {
            0% { transform: translateY(0px) rotate(0deg); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }
        /* Glassmorphism sidebar */
        .dashboard-layout {
            display: flex;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }
        .sidebar {
            width: 280px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(255,255,255,0.3);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            transition: transform 0.3s cubic-bezier(0.2,0.9,0.4,1.1);
            z-index: 1000;
        }
        .sidebar-header {
            padding: 2rem 1.5rem;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }
        .logo-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f97316, #10b981);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .logo-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f97316, #10b981);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .logo-sub {
            font-size: 0.7rem;
            font-weight: 600;
            color: #10b981;
            text-transform: uppercase;
        }
        .sidebar-nav {
            padding: 1.5rem;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            margin-bottom: 0.5rem;
            border-radius: 0.5rem;
            color: #334155;
            text-decoration: none;
            transition: all 0.2s;
        }
        .nav-item:hover {
            background: rgba(249,115,22,0.1);
            color: #f97316;
            transform: translateX(4px);
        }
        .nav-item.active {
            background: linear-gradient(135deg, #f97316, #10b981);
            color: white;
            box-shadow: 0 4px 15px rgba(249,115,22,0.3);
        }
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 2rem;
            animation: fadeInUp 0.5s ease-out;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Glass cards */
        .current-county-container, .current-weather-compact, .hourly-card, .forecast-card {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(8px);
            border-radius: 1.5rem;
            border: 1px solid rgba(255,255,255,0.5);
            transition: all 0.3s ease;
        }
        .current-county-container {
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
        }
        .county-info {
            display: flex;
            align-items: baseline;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .change-county-link {
            color: #f97316;
            text-decoration: none;
            font-weight: 500;
        }
        .current-weather-compact {
            padding: 1.8rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .current-temp {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f97316, #10b981);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            animation: breathe 2s ease infinite;
        }
        @keyframes breathe {
            0% { text-shadow: 0 0 0 rgba(249,115,22,0); }
            50% { text-shadow: 0 0 8px rgba(249,115,22,0.4); }
            100% { text-shadow: 0 0 0 rgba(249,115,22,0); }
        }
        .current-condition {
            font-size: 1.2rem;
            text-transform: capitalize;
        }
        .current-details {
            display: flex;
            gap: 1.5rem;
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }
        .current-icon img {
            width: 80px;
            height: 80px;
            animation: floatIcon 3s ease infinite;
        }
        @keyframes floatIcon {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0px); }
        }
        .hourly-list {
            display: flex;
            gap: 1rem;
            overflow-x: auto;
            padding-bottom: 1rem;
        }
        .hourly-card {
            min-width: 90px;
            padding: 1rem 0.5rem;
            text-align: center;
            transition: transform 0.2s;
        }
        .hourly-card:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.9);
        }
        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 1rem;
        }
        .forecast-card {
            padding: 1rem;
            text-align: center;
            transition: transform 0.2s;
        }
        .forecast-card:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.9);
        }
        .spinner {
            border: 4px solid rgba(0,0,0,0.1);
            border-top: 4px solid #f97316;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .menu-toggle-dashboard {
            display: none;
            background: linear-gradient(135deg, #f97316, #10b981);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
        }
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
                padding: 1rem;
            }
            .menu-toggle-dashboard {
                display: block;
            }
        }
    </style>
</head>
<body>
    <div class="animated-bg" id="animatedBg"></div>
    <div class="particles" id="particles"></div>

    <div class="dashboard-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="dashboard.html" class="logo">
                    <div class="logo-icon"><i data-lucide="cloud-sun"></i></div>
                    <div class="logo-text">
                        <span class="logo-title">Mkulima Alert</span>
                        <span class="logo-sub">Climate Smart</span>
                    </div>
                </a>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item active"><i data-lucide="cloud-sun"></i> Weather</a>
                <a href="marketplace.html" class="nav-item"><i data-lucide="shopping-cart"></i> Marketplace</a>
                <a href="forum.html" class="nav-item"><i data-lucide="message-square"></i> Forum</a>
                <a href="consultation.html" class="nav-item"><i data-lucide="phone-call"></i> Consultation</a>
                <a href="profile.html" class="nav-item"><i data-lucide="user"></i> My Profile</a>
                <a href="#" class="nav-item" id="logoutBtn"><i data-lucide="log-out"></i> Logout</a>
            </nav>
        </aside>

        <main class="main-content">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
                <h1>Welcome, <span id="userName">Farmer</span>!</h1>
                <button class="menu-toggle-dashboard" id="menuToggle">☰ Menu</button>
            </div>
            <div class="current-county-container">
                <div class="county-info">
                    <span class="label">Your County:</span>
                    <span id="currentCountyDisplay" class="county-name">Loading...</span>
                    <a href="profile.html" class="change-county-link">Change</a>
                </div>
                <div id="weatherContainer" class="weather-container">
                    <div class="spinner"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Generate floating particles
        function createParticles() {
            const container = document.getElementById('particles');
            if (!container) return;
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                const size = Math.random() * 6 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.bottom = '-20px';
                particle.style.animationDelay = Math.random() * 5 + 's';
                particle.style.animationDuration = Math.random() * 6 + 4 + 's';
                container.appendChild(particle);
            }
        }
        createParticles();

        // Weather API
        const WEATHER_API_KEY = '3718844e76e32727eb66f5a14fa67841';

        function showNotification(type, message) {
            const old = document.querySelector('.notification-toast');
            if (old) old.remove();
            const notif = document.createElement('div');
            notif.className = `notification-toast ${type}`;
            notif.innerHTML = `<div class="notification-content"><span class="notification-icon">${type === 'success' ? '✓' : '⚠'}</span><span class="notification-message">${message}</span></div>`;
            document.body.appendChild(notif);
            setTimeout(() => notif.classList.add('show'), 10);
            setTimeout(() => {
                notif.classList.remove('show');
                setTimeout(() => notif.remove(), 300);
            }, 5000);
        }

        function formatDay(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric' });
        }
        function formatHour(timestamp) {
            const date = new Date(timestamp * 1000);
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        // Change gradient based on weather
        function setWeatherGradient(condition) {
            const bg = document.getElementById('animatedBg');
            if (!bg) return;
            const cond = condition.toLowerCase();
            let gradient = '';
            if (cond.includes('clear') || cond.includes('sun')) {
                gradient = 'linear-gradient(125deg, #fbbf24, #f97316, #f59e0b)';
            } else if (cond.includes('rain') || cond.includes('drizzle')) {
                gradient = 'linear-gradient(125deg, #1e3a8a, #3b82f6, #1e3a8a)';
            } else if (cond.includes('cloud')) {
                gradient = 'linear-gradient(125deg, #475569, #94a3b8, #475569)';
            } else if (cond.includes('thunder') || cond.includes('storm')) {
                gradient = 'linear-gradient(125deg, #4c1d95, #8b5cf6, #4c1d95)';
            } else {
                gradient = 'linear-gradient(125deg, #0f172a, #1e293b, #0f172a)';
            }
            bg.style.background = gradient;
            bg.style.backgroundSize = '200% 200%';
        }

        async function fetchWeather(county) {
            const container = document.getElementById('weatherContainer');
            if (!container) return;
            if (!WEATHER_API_KEY || WEATHER_API_KEY === 'YOUR_OPENWEATHER_API_KEY') {
                container.innerHTML = '<div class="error-message">⚠️ Weather API key missing.</div>';
                return;
            }
            const city = county.trim();
            const url = `https://api.openweathermap.org/data/2.5/forecast?q=${encodeURIComponent(city)}&units=metric&appid=${WEATHER_API_KEY}`;
            container.innerHTML = '<div class="spinner"></div>';
            try {
                const resp = await fetch(url);
                if (!resp.ok) throw new Error('API error');
                const data = await resp.json();
                const current = data.list[0];
                const condition = current.weather[0].description;
                setWeatherGradient(condition);

                const currentTemp = Math.round(current.main.temp);
                const icon = `https://openweathermap.org/img/wn/${current.weather[0].icon}@4x.png`;
                const humidity = current.main.humidity;
                const windSpeed = current.wind.speed;
                const feelsLike = Math.round(current.main.feels_like);

                const hourlyData = data.list.slice(0, 8);
                let hourlyHtml = '<div class="hourly-forecast"><h3>Hourly Forecast</h3><div class="hourly-list">';
                for (const item of hourlyData) {
                    const time = formatHour(item.dt);
                    const temp = Math.round(item.main.temp);
                    const iconCode = item.weather[0].icon;
                    const iconUrl = `https://openweathermap.org/img/wn/${iconCode}.png`;
                    hourlyHtml += `<div class="hourly-card"><div class="hourly-time">${time}</div><div class="hourly-icon"><img src="${iconUrl}"></div><div class="hourly-temp">${temp}°</div></div>`;
                }
                hourlyHtml += '</div></div>';

                const dailyMap = {};
                data.list.forEach(item => {
                    const date = item.dt_txt.split(' ')[0];
                    if (!dailyMap[date]) dailyMap[date] = item;
                });
                const dailyArray = Object.values(dailyMap).slice(0, 7);
                let dailyHtml = '<div class="daily-forecast"><h3>7-Day Forecast</h3><div class="forecast-grid">';
                for (const day of dailyArray) {
                    const dayName = formatDay(day.dt_txt.split(' ')[0]);
                    const tempHigh = Math.round(day.main.temp_max);
                    const tempLow = Math.round(day.main.temp_min);
                    const iconCode = day.weather[0].icon;
                    const iconUrl = `https://openweathermap.org/img/wn/${iconCode}@2x.png`;
                    dailyHtml += `<div class="forecast-card"><div class="forecast-day">${dayName}</div><div class="forecast-icon"><img src="${iconUrl}"></div><div class="forecast-temp"><span class="forecast-temp-high">${tempHigh}°</span><span class="forecast-temp-low">${tempLow}°</span></div></div>`;
                }
                dailyHtml += '</div></div>';

                container.innerHTML = `
                    <div class="current-weather-compact">
                        <div class="current-temp-section">
                            <div class="current-temp">${currentTemp}°C</div>
                            <div class="current-condition">${condition}</div>
                            <div class="current-details">
                                <span>💧 ${humidity}%</span>
                                <span>💨 ${windSpeed} m/s</span>
                                <span>🌡️ ${feelsLike}°</span>
                            </div>
                        </div>
                        <div class="current-icon">
                            <img src="${icon}" alt="${condition}">
                        </div>
                    </div>
                    ${hourlyHtml}
                    ${dailyHtml}
                `;
            } catch (err) {
                console.error(err);
                container.innerHTML = `<div class="error-message">⚠️ Weather fetch failed for "${city}". Check your county in profile.</div>`;
            }
        }

        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = "index.html"; return; }
            document.getElementById('userName').innerText = user.displayName || 'Farmer';
            const userRef = db.collection('users').doc(user.uid);
            const doc = await userRef.get();
            let savedCounty = null;
            if (doc.exists) {
                savedCounty = doc.data().county;
            } else {
                await userRef.set({ name: user.displayName, email: user.email, createdAt: firebase.firestore.FieldValue.serverTimestamp(), county: null });
            }
            const countySpan = document.getElementById('currentCountyDisplay');
            if (savedCounty) {
                countySpan.innerText = savedCounty;
                fetchWeather(savedCounty);
            } else {
                countySpan.innerText = 'Not set';
                document.getElementById('weatherContainer').innerHTML = '<div class="error-message">Please <a href="profile.html">set your county</a> to see weather.</div>';
            }
        });

        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        if (menuToggle) menuToggle.addEventListener('click', () => sidebar.classList.toggle('open'));
        document.getElementById('logoutBtn').addEventListener('click', (e) => { e.preventDefault(); auth.signOut().then(() => window.location.href = "index.html"); });
    </script>
</body>
</html>
