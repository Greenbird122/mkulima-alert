<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mkulima Alert - Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@0.344.0/font/lucide.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
</head>
<body>
<div class="dashboard-layout">
    <!-- Sidebar (unchanged) -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="dashboard.html" class="logo">
                <div class="logo-icon"><i data-lucide="cloud-sun"></i></div>
                <div class="logo-text">
                    <span class="logo-title">Mkulima Alert</span>
                    <span class="logo-sub">Climate Smart</span>
                </div>
            </a>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item active">
                <i data-lucide="cloud-sun"></i> Weather
            </a>
            <a href="marketplace.html" class="nav-item">
                <i data-lucide="shopping-cart"></i> Marketplace
            </a>
            <a href="forum.html" class="nav-item">
                <i data-lucide="message-square"></i> Forum
            </a>
            <a href="consultation.html" class="nav-item">
                <i data-lucide="phone-call"></i> Consultation
            </a>
            <a href="#" class="nav-item" id="logoutBtn">
                <i data-lucide="log-out"></i> Logout
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>Welcome, <span id="userName">Farmer</span>!</h1>
            <button class="menu-toggle-dashboard" id="menuToggle" style="display: none;">☰</button>
        </div>

        <!-- Weather Widget -->
        <div class="weather-section">
            <h2>Weather Forecast</h2>
            <label for="countySearch">Your County:</label>
            <!-- Search input to filter the dropdown -->
            <input type="text" id="countySearch" placeholder="Type to search county..." autocomplete="off" style="margin-bottom: 0.5rem; width: 100%; padding: 0.5rem; border-radius: 0.5rem; border: 1px solid #ccc;">
            <select id="countySelect" size="10" style="width: 100%; padding: 0.5rem; border-radius: 0.5rem;">
                <!-- options will be populated by JavaScript -->
            </select>
            <div id="weatherWidget" class="weather-widget"></div>
        </div>
    </main>
</div>

<script>
    // List of all 47 counties in Kenya
    const counties = [
        "Mombasa", "Kwale", "Kilifi", "Tana River", "Lamu", "Taita Taveta",
        "Garissa", "Wajir", "Mandera", "Marsabit", "Isiolo", "Meru", "Tharaka Nithi",
        "Embu", "Kitui", "Machakos", "Makueni", "Nyandarua", "Nyeri", "Kirinyaga",
        "Murang'a", "Kiambu", "Turkana", "West Pokot", "Samburu", "Trans Nzoia",
        "Uasin Gishu", "Elgeyo Marakwet", "Nandi", "Baringo", "Laikipia", "Nakuru",
        "Narok", "Kajiado", "Kericho", "Bomet", "Kakamega", "Vihiga", "Bungoma",
        "Busia", "Siaya", "Kisumu", "Homa Bay", "Migori", "Kisii", "Nyamira", "Nairobi"
    ];

    // Populate the select element with counties
    const countySelect = document.getElementById('countySelect');
    const countySearch = document.getElementById('countySearch');

    function renderCountyOptions(filter = '') {
        const filterLower = filter.toLowerCase();
        const filtered = counties.filter(c => c.toLowerCase().includes(filterLower));
        countySelect.innerHTML = '';
        filtered.forEach(county => {
            const option = document.createElement('option');
            option.value = county;
            option.textContent = county;
            countySelect.appendChild(option);
        });
        // If there's only one option and it matches exactly, select it automatically (optional)
        if (filtered.length === 1 && filtered[0].toLowerCase() === filterLower) {
            countySelect.value = filtered[0];
        }
    }

    // Initial render (all counties)
    renderCountyOptions();

    // Filter as the user types
    countySearch.addEventListener('input', (e) => {
        renderCountyOptions(e.target.value);
    });

    // Optional: When user selects a county from the dropdown, we can save it and fetch weather.
    countySelect.addEventListener('change', (e) => {
        const selectedCounty = e.target.value;
        if (selectedCounty) {
            // Save to Firestore and fetch weather via dashboard.js
            // This will be handled by dashboard.js, but we need to trigger it.
            // We'll just set the value and let dashboard.js's change listener handle the rest.
            // However, because we replaced the original select with a new one, we must ensure
            // that dashboard.js's event listener is attached to the correct element.
            // To avoid duplication, we will not re-attach; we'll rely on the existing listener in dashboard.js.
        }
    });
</script>

<script src="dashboard.js"></script>
<script>
    // Toggle sidebar on mobile
    const menuToggle = document.getElementById('menuToggle');
    const sidebar = document.getElementById('sidebar');
    if (menuToggle) {
        menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('open');
        });
    }
    // Logout button
    document.getElementById('logoutBtn').addEventListener('click', (e) => {
        e.preventDefault();
        auth.signOut().then(() => window.location.href = "index.html");
    });
    // Lucide icons
    lucide.createIcons();
</script>
</body>
</html>
