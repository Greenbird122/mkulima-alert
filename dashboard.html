<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mkulima Alert - Dashboard</title>
    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@0.344.0/font/lucide.css">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        /* ---------- Global Variables ---------- */
        :root {
            --orange: #f97316;
            --emerald: #10b981;
            --blue: #0ea5e9;
            --slate-900: #0f172a;
            --slate-800: #1e293b;
            --slate-700: #334155;
            --slate-600: #475569;
            --slate-500: #64748b;
            --slate-400: #94a3b8;
            --slate-300: #cbd5e1;
            --slate-200: #e2e8f0;
            --slate-100: #f1f5f9;
            --slate-50: #f8fafc;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--slate-700);
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
        }

        /* Video Background */
        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -2;
            object-fit: cover;
            filter: brightness(0.7) blur(2px);
            transition: opacity 0.5s ease;
        }

        /* Dark overlay for readability */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: -1;
        }

        /* Dashboard Layout */
        .dashboard-layout {
            display: flex;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        /* Glassmorphism Sidebar */
        .sidebar {
            width: 280px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(255,255,255,0.3);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            z-index: 1000;
        }

        .sidebar-header {
            padding: 2rem 1.5rem;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .sidebar-header .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--orange), var(--emerald));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: transform 0.2s ease;
        }

        .logo-icon:hover {
            transform: scale(1.05);
        }

        .logo-text {
            display: flex;
            flex-direction: column;
            line-height: 1.2;
        }

        .logo-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--orange), var(--emerald));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .logo-sub {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--emerald);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .sidebar-nav {
            padding: 1.5rem;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            margin-bottom: 0.5rem;
            border-radius: 0.5rem;
            color: var(--slate-700);
            text-decoration: none;
            transition: all 0.2s;
        }

        .nav-item:hover {
            background: rgba(249,115,22,0.1);
            color: var(--orange);
            transform: translateX(4px);
        }

        .nav-item.active {
            background: linear-gradient(135deg, var(--orange), var(--emerald));
            color: white;
            box-shadow: 0 4px 15px rgba(249,115,22,0.3);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 2rem;
            animation: fadeInUp 0.5s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Glass Cards */
        .current-county-container, .current-weather-compact, .hourly-card, .forecast-card {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(8px);
            border-radius: 1.5rem;
            border: 1px solid rgba(255,255,255,0.5);
            transition: all 0.3s ease;
        }

        .current-county-container {
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
        }

        .current-weather-compact {
            padding: 1.8rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .current-temp {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--orange), var(--emerald));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .hourly-list {
            display: flex;
            gap: 1rem;
            overflow-x: auto;
            padding-bottom: 1rem;
        }

        .hourly-card {
            min-width: 90px;
            padding: 1rem 0.5rem;
            text-align: center;
        }

        .hourly-card:hover, .forecast-card:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.9);
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 1rem;
        }

        .forecast-card {
            padding: 1rem;
            text-align: center;
        }

        .change-county-link {
            color: var(--orange);
            text-decoration: none;
            font-weight: 500;
        }

        /* Spinner */
        .spinner {
            border: 4px solid rgba(0,0,0,0.1);
            border-top: 4px solid var(--orange);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Mobile */
        .menu-toggle-dashboard {
            display: none;
            background: linear-gradient(135deg, var(--orange), var(--emerald));
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
                padding: 1rem;
            }
            .menu-toggle-dashboard {
                display: block;
            }
        }
    </style>
</head>
<body>
    <!-- Video Background -->
    <video autoplay muted loop playsinline id="bg-video">
        <source src="https://assets.mixkit.co/videos/preview/mixkit-sunny-day-in-a-wheat-field-41017-large.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <div class="dashboard-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="dashboard.html" class="logo">
                    <div class="logo-icon"><i data-lucide="cloud-sun"></i></div>
                    <div class="logo-text">
                        <span class="logo-title">Mkulima Alert</span>
                        <span class="logo-sub">Climate Smart</span>
                    </div>
                </a>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item active"><i data-lucide="cloud-sun"></i> Weather</a>
                <a href="marketplace.html" class="nav-item"><i data-lucide="shopping-cart"></i> Marketplace</a>
                <a href="forum.html" class="nav-item"><i data-lucide="message-square"></i> Forum</a>
                <a href="consultation.html" class="nav-item"><i data-lucide="phone-call"></i> Consultation</a>
                <a href="profile.html" class="nav-item"><i data-lucide="user"></i> My Profile</a>
                <a href="#" class="nav-item" id="logoutBtn"><i data-lucide="log-out"></i> Logout</a>
            </nav>
        </aside>

        <main class="main-content">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
                <h1>Welcome, <span id="userName">Farmer</span>!</h1>
                <button class="menu-toggle-dashboard" id="menuToggle">☰ Menu</button>
            </div>

            <div class="current-county-container">
                <div class="county-info">
                    <span class="label">Your County:</span>
                    <span id="currentCountyDisplay" class="county-name">Loading...</span>
                    <a href="profile.html" class="change-county-link">Change</a>
                </div>
                <div id="weatherContainer" class="weather-container">
                    <div class="spinner"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="dashboard.js"></script>
    <script>
        // Sidebar toggle
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        if (menuToggle) {
            menuToggle.addEventListener('click', () => {
                sidebar.classList.toggle('open');
            });
        }
        // Logout
        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            auth.signOut().then(() => window.location.href = "index.html");
        });
    </script>
</body>
</html>
